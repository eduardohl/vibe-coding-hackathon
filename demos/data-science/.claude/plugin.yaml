# Databricks Data Science Plugin for Claude Code
# This plugin bundles commands, skills, agents, and hooks for ML experimentation

name: databricks-data-science
version: 1.0.0
description: Complete Claude Code workflow for ML experimentation with MLflow on Databricks

author: Data Platform Team
homepage: https://github.com/databricks-claude-code-hackathon

# Required Claude Code version
requires:
  claude-code: ">=1.0.0"

# Components included in this plugin
components:
  # Slash commands for common operations
  commands:
    - train.md           # /train - Train model with MLflow logging
    - evaluate.md        # /evaluate - Evaluate model performance
    - tune.md            # /tune - Hyperparameter tuning
    - create-pr.md       # /create-pr - Create pull requests

  # Skills that trigger automatically
  skills:
    - mlflow-logging.md        # Triggers on "mlflow", "log experiment", "track"
    - hyperparameter-tuning.md # Triggers on "tune", "hyperparameter", "grid search"

  # Specialized agents for complex tasks
  agents:
    - feature-engineer.md      # Feature creation specialist
    - model-evaluator.md       # Performance analysis specialist
    - experiment-analyzer.md   # MLflow run comparison

  # Hooks for automation
  hooks:
    PostToolUse:
      Write:
        - command: "ruff format $FILEPATH"
          description: "Auto-format Python files with Ruff"
          match: "*.py"
        - command: "ruff check --fix $FILEPATH"
          description: "Auto-fix linting issues with Ruff"
          match: "*.py"

# MCP servers this plugin expects
mcp:
  required:
    - databricks    # For Unity Catalog queries and MLflow
  optional:
    - github        # For PR creation
    - obsidian      # For experiment documentation

# Permissions the plugin needs
permissions:
  allow:
    - "Bash(python *)"
    - "Bash(pip *)"
    - "Bash(git *)"
    - "Bash(ruff *)"
    - "Bash(mlflow *)"
    - "Read"
    - "Write"
    - "Edit"
  deny:
    - "Bash(rm -rf *)"
    - "Bash(pip uninstall *)"

# Example usage
examples:
  - description: "Train and evaluate a model"
    steps:
      - "/train"
      - "/evaluate"
      - "/create-pr"

  - description: "Hyperparameter tuning"
    prompt: "Tune the hyperparameters to improve model performance"

  - description: "Feature engineering"
    prompt: "Help me create better features for demand forecasting"

  - description: "Analyze experiments"
    prompt: "Compare my MLflow runs and find the best model"

  - description: "Code review before PR"
    steps:
      - "Review my training code changes"
      - "/create-pr"
